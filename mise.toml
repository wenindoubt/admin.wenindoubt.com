[tools]
node = "24"

[tasks.install]
description = "Install dependencies (clean, from lockfile)"
run = "npm ci"

[tasks.dev]
description = "Start dev server"
run = "npm run dev"

[tasks.build]
description = "Production build"
run = "npm run build"

[tasks.start]
description = "Start production server"
run = "npm run start"
depends = ["build"]

[tasks.lint]
description = "Run Biome lint + format check"
run = "npm run lint"

[tasks."lint:fix"]
description = "Auto-fix lint + formatting"
run = "npm run lint:fix"

[tasks.format]
description = "Format all files"
run = "npm run format"

[tasks.typecheck]
description = "Type check with TypeScript"
run = "npx tsc --noEmit"

[tasks.check]
description = "Run all quality checks"
depends = ["lint", "typecheck"]

[tasks."check:ci"]
description = "Run all quality checks (CI)"
depends = ["lint", "typecheck", "build"]

[tasks.seed]
description = "Seed sample data"
run = "npx tsx scripts/seed.ts"

[tasks."seed:clean"]
description = "Remove sample data"
run = "npx tsx scripts/seed.ts --clean"

[tasks."db:push"]
description = "Push Drizzle schema to local DB"
run = 'DATABASE_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres" npx drizzle-kit push'

[tasks."db:start"]
description = "Start local Supabase"
run = "supabase start"

[tasks."db:stop"]
description = "Stop local Supabase"
run = "supabase stop"

[tasks."db:reset"]
description = "Reset local DB (re-run all migrations + seed)"
run = "supabase db reset"

[tasks."db:migrate"]
description = "Create a new migration file"
run = "supabase migration new"

[tasks."db:status"]
description = "Show Supabase service status + URLs/keys"
run = "supabase status"

[tasks."test:e2e"]
description = "Run Playwright E2E tests"
run = "npx playwright test"

[tasks."test:e2e:ui"]
description = "Run Playwright E2E tests with UI"
run = "npx playwright test --ui"

[tasks.inspect]
description = "Headless page inspection (screenshot + errors + a11y tree)"
run = "npx tsx scripts/inspect.ts {{arg(name='path', i=0)}}"
