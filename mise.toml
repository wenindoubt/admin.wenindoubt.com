[tools]
node = "24"
supabase = "2"

[env]
_.file = ".env.local"

[hooks]

[tasks.install]
description = "Install dependencies (clean, from lockfile)"
run = "npm ci"

[tasks.dev]
description = "Start dev server"
run = "npm run dev"

[tasks.build]
description = "Production build"
run = "npm run build"

[tasks.start]
description = "Start production server"
run = "npm run start"
depends = ["build"]

[tasks.lint]
description = "Run Biome lint + format check"
run = "npm run lint"

[tasks."lint:fix"]
description = "Auto-fix lint + formatting"
run = "npm run lint:fix"

[tasks.format]
description = "Format all files"
run = "npm run format"

[tasks.typecheck]
description = "Type check with TypeScript"
run = "npx tsc --noEmit"
sources = ["src/**/*.ts", "src/**/*.tsx"]

[tasks.check]
description = "Run all quality checks"
depends = ["lint", "typecheck"]

[tasks."check:ci"]
description = "Run all CI pipeline checks (lint, typecheck, build, audit, semgrep)"
depends = ["lint", "typecheck", "build", "audit", "semgrep"]

[tasks.audit]
description = "npm audit (high+ severity, prod deps only)"
run = "npm audit --audit-level=high --omit=dev"

[tasks.semgrep]
description = "SAST scan via Semgrep (Docker, matches CI)"
run = "docker run --rm -v \"$(pwd):/src\" semgrep/semgrep:1.156.0 semgrep scan --config auto --error"

[tasks.seed]
description = "Seed sample data"
run = "node_modules/.bin/tsx scripts/seed.ts"

[tasks."seed:clean"]
description = "Remove sample data"
run = "node_modules/.bin/tsx scripts/seed.ts --clean"

[tasks."seed:talent"]
description = "Seed talent data (replaces TestTlnt E2E records)"
run = "node_modules/.bin/tsx scripts/seed-talent.ts"

[tasks."seed:talent:clean"]
description = "Remove seeded talent"
run = "node_modules/.bin/tsx scripts/seed-talent.ts --clean"

[tasks."db:push"]
description = "Push Drizzle schema to local DB"
run = "npx drizzle-kit push"

[tasks."db:start"]
description = "Start local Supabase"
run = "supabase start"

[tasks."db:stop"]
description = "Stop local Supabase"
run = "supabase stop"

[tasks."db:reset"]
description = "Reset local DB (re-run all migrations + seed)"
run = "supabase db reset"

[tasks."db:migrate"]
description = "Create a new migration file"
run = "supabase migration new"

[tasks."db:status"]
description = "Show Supabase service status + URLs/keys"
run = "supabase status"

[tasks."db:prod:link"]
description = "Link to production Supabase project"
env = { _.file = ".env.prod" }
run = "supabase link --project-ref $SUPABASE_PROJECT_REF"

[tasks."db:prod:push"]
description = "Push pending migrations to production"
env = { _.file = ".env.prod" }
run = "supabase db push --dry-run && echo '\n--- Dry run passed. Pushing for real... ---\n' && supabase db push"

[tasks."db:prod:reset"]
description = "Reset production DB and re-run all migrations (DESTRUCTIVE)"
env = { _.file = ".env.prod" }
run = "supabase db reset --linked --yes"

[tasks.test]
description = "Run unit tests"
run = "npx vitest run"

[tasks."test:watch"]
description = "Run unit tests in watch mode"
run = "npx vitest"

[tasks."test:e2e"]
description = "Run Playwright E2E tests"
run = "npx playwright test"

[tasks."test:e2e:ui"]
description = "Run Playwright E2E tests with UI"
run = "npx playwright test --ui"

[tasks."backfill:assigned-to"]
description = "Backfill assigned-to field"
run = "npx tsx scripts/backfill-assigned-to.ts"

[tasks."backfill:embeddings"]
description = "Backfill note embeddings"
run = "npx tsx scripts/backfill-note-embeddings.ts"

[tasks."api:keygen"]
description = "Generate a new API key for the /api/v1/ingest endpoint"
run = "npx tsx scripts/generate-api-key.ts {{arg(name='name', i=0)}}"

[tasks."api:list"]
description = "List all API keys"
run = "npx tsx scripts/list-api-keys.ts"

[tasks."api:delete"]
description = "Delete an API key by ID (use api:list to find IDs)"
run = "npx tsx scripts/delete-api-key.ts {{arg(name='id', i=0)}}"

[tasks."api:prod:keygen"]
description = "Generate a new API key against production DB"
env = { _.file = ".env.prod" }
run = "npx tsx scripts/generate-api-key.ts {{arg(name='name', i=0)}}"

[tasks."api:prod:list"]
description = "List all API keys in production"
env = { _.file = ".env.prod" }
run = "npx tsx scripts/list-api-keys.ts"

[tasks."api:prod:delete"]
description = "Delete an API key by ID in production"
env = { _.file = ".env.prod" }
run = "npx tsx scripts/delete-api-key.ts {{arg(name='id', i=0)}}"

[tasks.inspect]
description = "Headless page inspection (screenshot + errors + a11y tree)"
run = "npx tsx scripts/inspect.ts {{arg(name='path', i=0)}}"
