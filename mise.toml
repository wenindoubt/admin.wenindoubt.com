[tools]
node = "24"

[env]
_.file = ".env.local"

[hooks]

[tasks.install]
description = "Install dependencies (clean, from lockfile)"
run = "npm ci"

[tasks.dev]
description = "Start dev server"
run = "npm run dev"

[tasks.build]
description = "Production build"
run = "npm run build"

[tasks.start]
description = "Start production server"
run = "npm run start"
depends = ["build"]

[tasks.lint]
description = "Run Biome lint + format check"
run = "npm run lint"

[tasks."lint:fix"]
description = "Auto-fix lint + formatting"
run = "npm run lint:fix"

[tasks.format]
description = "Format all files"
run = "npm run format"

[tasks.typecheck]
description = "Type check with TypeScript"
run = "npx tsc --noEmit"
sources = ["src/**/*.ts", "src/**/*.tsx"]

[tasks.check]
description = "Run all quality checks"
depends = ["lint", "typecheck"]

[tasks."check:ci"]
description = "Run all CI pipeline checks (lint, typecheck, build, audit, semgrep)"
depends = ["lint", "typecheck", "build", "audit", "semgrep"]

[tasks.audit]
description = "npm audit (high+ severity, prod deps only)"
run = "npm audit --audit-level=high --omit=dev"

[tasks.semgrep]
description = "SAST scan via Semgrep (Docker, matches CI)"
run = "docker run --rm -v \"$(pwd):/src\" semgrep/semgrep:1.156.0 semgrep scan --config auto --error"

[tasks.seed]
description = "Seed sample data"
run = "npx tsx scripts/seed.ts"

[tasks."seed:clean"]
description = "Remove sample data"
run = "npx tsx scripts/seed.ts --clean"

[tasks."db:push"]
description = "Push Drizzle schema to local DB"
run = "npx drizzle-kit push"

[tasks."db:start"]
description = "Start local Supabase"
run = "supabase start"

[tasks."db:stop"]
description = "Stop local Supabase"
run = "supabase stop"

[tasks."db:reset"]
description = "Reset local DB (re-run all migrations + seed)"
run = "supabase db reset"

[tasks."db:migrate"]
description = "Create a new migration file"
run = "supabase migration new"

[tasks."db:status"]
description = "Show Supabase service status + URLs/keys"
run = "supabase status"

[tasks.test]
description = "Run unit tests"
run = "npx vitest run"

[tasks."test:watch"]
description = "Run unit tests in watch mode"
run = "npx vitest"

[tasks."test:e2e"]
description = "Run Playwright E2E tests"
run = "npx playwright test"

[tasks."test:e2e:ui"]
description = "Run Playwright E2E tests with UI"
run = "npx playwright test --ui"

[tasks."backfill:assigned-to"]
description = "Backfill assigned-to field"
run = "npx tsx scripts/backfill-assigned-to.ts"

[tasks."backfill:embeddings"]
description = "Backfill note embeddings"
run = "npx tsx scripts/backfill-note-embeddings.ts"

[tasks.inspect]
description = "Headless page inspection (screenshot + errors + a11y tree)"
run = "npx tsx scripts/inspect.ts {{arg(name='path', i=0)}}"
