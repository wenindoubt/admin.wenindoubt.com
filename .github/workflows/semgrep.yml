name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC

permissions:
  contents: read

jobs:
  scan:
    name: SAST Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.156.0@sha256:a3d49dc967b8534a6a76628e50c51cbfe33eb7195dc2feab1fdc0f100852c8ef
    if: "github.actor != 'dependabot[bot]' && !startsWith(github.event.head_commit.message, 'chore(main): release')"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - run: semgrep scan --config auto --error
